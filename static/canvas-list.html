<!DOCTYPE html>
<html lang="zh-CN" data-studio-scale="off">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <title>项目工作台</title>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2026.07.12.1782696751"></script>
    <script src="/static/vendor/js/lucide.js?v=2026.07.12.1782696749"></script>
    <script src="/static/js/theme.js?v=2026.07.12.1783117645"></script>
    <script src="/static/js/touch-mouse.js?v=2026.07.12.1783079819"></script>
    <script src="/static/js/i18n.js?v=2026.07.12.1783116068"></script>
    <link rel="stylesheet" href="/static/css/canvas-list.css?v=2026.07.12.1783079294">
    <link rel="stylesheet" href="/static/css/theme.css?v=2026.07.12.1782696682">
</head>
<body>
    <div id="workspace" class="workspace">
        <!-- LEFT: project sidebar -->
        <aside id="sidebar" class="ws-sidebar">
            <div class="ws-side-head">
                <div class="ws-side-title">项目</div>
                <button id="newProjectBtn" class="ws-side-add" type="button" title="新建项目" aria-label="新建项目">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="newProjectRow" class="ws-newproj-row">
                <input id="newProjectInput" class="ws-newproj-input" type="text" maxlength="60" placeholder="项目名称">
                <button id="newProjectConfirm" class="ws-mini-btn primary" type="button" title="确定" aria-label="确定"><i data-lucide="check" class="w-3.5 h-3.5"></i></button>
                <button id="newProjectCancel" class="ws-mini-btn" type="button" title="取消" aria-label="取消"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
            </div>
            <div id="projectList" class="ws-project-list"></div>
            <div class="ws-side-foot">
                <button id="trashEntry" class="ws-trash-entry" type="button">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                    <span class="ws-trash-label">回收站</span>
                    <span id="trashBadge" class="ws-trash-badge">0</span>
                </button>
            </div>
        </aside>

        <!-- RIGHT: board -->
        <main class="ws-main">
            <div class="ws-topbar">
                <div class="ws-topbar-left">
                    <div id="boardProjectName" class="ws-board-name">默认项目</div>
                    <span id="boardCanvasCount" class="ws-board-count">0</span>
                </div>
                <div class="ws-topbar-right">
                    <button id="pasteCanvasBtn" class="ws-paste-btn" type="button" title="粘贴到此项目" style="display:none"><i data-lucide="clipboard-paste" class="w-4 h-4"></i><span>粘贴到此项目</span></button>
                    <button id="boardResetView" class="ws-icon-btn" type="button" title="重置视图" aria-label="重置视图"><i data-lucide="locate-fixed" class="w-4 h-4"></i></button>
                    <button id="boardRefresh" class="ws-icon-btn" type="button" title="刷新" aria-label="刷新"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                    <button id="newCanvasBtn" class="ws-primary-btn" type="button"><i data-lucide="plus" class="w-4 h-4"></i><span>新建画布</span></button>
                </div>
            </div>

            <!-- Board (pan/zoom) -->
            <div id="board" class="ws-board">
                <div id="boardWorld" class="ws-board-world"></div>
                <div id="boardEmptyHint" class="ws-board-empty">
                    <div class="ws-board-empty-icon"><i data-lucide="mouse-pointer-click" class="w-7 h-7"></i></div>
                    <div class="ws-board-empty-text">暂无画布</div>
                    <div class="ws-board-empty-sub">为当前项目创建第一块画布</div>
                    <div class="ws-board-empty-actions">
                        <button id="emptyCreateCanvasBtn" class="ws-primary-btn" type="button"><i data-lucide="plus" class="w-4 h-4"></i><span>新建画布</span></button>
                    </div>
                </div>
            </div>

            <!-- Trash panel (overlay over the board area) -->
            <div id="trashPanel" class="ws-trash-panel">
                <div class="ws-trash-head">
                    <div class="ws-trash-head-title"><i data-lucide="trash-2" class="w-4 h-4"></i><span>回收站</span></div>
                    <button id="trashClose" class="ws-icon-btn" type="button" title="关闭" aria-label="关闭"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div class="ws-trash-note"><i data-lucide="info" class="w-3.5 h-3.5"></i><span>回收站中的画布会在 30 天后自动清理。</span></div>
                <div id="trashList" class="ws-trash-list"></div>
            </div>

            <div id="boardStatus" class="ws-status"></div>
        </main>
    </div>
    <script src="/static/js/canvas-list.js?v=2026.07.12.1783077284"></script>
</body>
</html>
