<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云同步</title>
    <script>
        (function(){
            try {
                document.documentElement.dataset.studioFitScale = 'off';
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2026.07.15.1783222828"></script>
    <script src="/static/vendor/js/lucide.js?v=2026.07.15.1783222821"></script>
    <script src="/static/js/theme.js?v=2026.07.15.1783222763"></script>
    <script src="/static/js/i18n.js?v=2026.07.15.1784207842"></script>
    <link rel="stylesheet" href="/static/css/theme.css?v=2026.07.15.1783222708">
    <link rel="stylesheet" href="/static/css/api-settings.css?v=2026.07.15.1784200258">
    <style>
        .cloud-sync-page .wrap { max-width:920px; }
        .cloud-sync-page .page-head .sub { max-width:680px; }
        .cloud-sync-page .cloud-sync-block { box-shadow:0 18px 42px rgba(15,23,42,.06); }
        html.studio-theme-dark .cloud-sync-page .cloud-sync-block,
        body.studio-theme-dark.cloud-sync-page .cloud-sync-block { box-shadow:0 18px 42px rgba(0,0,0,.18); }
    </style>
</head>
<body class="cloud-sync-page">
    <div class="page">
        <div class="wrap">
            <header class="page-head">
                <div>
                    <div class="title" data-i18n="api.cloudSyncTitle">云同步</div>
                    <div class="sub" data-i18n="api.cloudSyncDesc">通过 WebDAV 在多设备间同步 API 平台、模型列表和 Key。</div>
                </div>
            </header>

            <section class="block cloud-sync-manual-block">
                <div class="block-head">
                    <div>
                        <div class="block-title" data-i18n="api.cloudSyncManualTitle">手动导入导出</div>
                        <div class="block-desc" data-i18n="api.cloudSyncManualDesc">导出本机 API 配置备份，或导入备份文件恢复到本机。</div>
                    </div>
                </div>
                <input id="cloudSyncImportFile" class="cloud-sync-import-input" type="file" accept="application/json,.json">
                <div class="cloud-sync-manual-card">
                    <button id="cloudSyncImportBtn" class="cloud-sync-file-btn" type="button" onclick="chooseCloudSyncImport()">
                        <i data-lucide="folder-open" class="w-4 h-4"></i>
                        <span data-i18n="api.cloudSyncManualImport">选择备份 JSON</span>
                    </button>
                    <button id="cloudSyncExportBtn" class="cloud-sync-file-btn" type="button" onclick="exportCloudSyncFile()">
                        <i data-lucide="download" class="w-4 h-4"></i>
                        <span data-i18n="api.cloudSyncManualExport">导出 API 备份</span>
                    </button>
                </div>
            </section>

            <section id="cloudSyncBlock" class="block cloud-sync-block">
                <div class="block-head">
                    <div>
                        <div class="block-title" data-i18n="api.cloudSyncTitle">云同步</div>
                        <div class="block-desc" data-i18n="api.cloudSyncDesc">通过 WebDAV 在多设备间同步 API 平台、模型列表和 Key。</div>
                    </div>
                    <div id="cloudSyncStatus" class="cloud-sync-status" aria-live="polite"></div>
                </div>
                <div class="cloud-sync-form">
                    <label class="field">
                        <span class="label" data-i18n="api.cloudSyncProvider">服务商</span>
                        <div class="field-frame">
                            <select id="cloudSyncProviderInput">
                                <option value="jianguoyun" data-i18n="api.cloudSyncProviderJianguoyun">坚果云</option>
                                <option value="custom" data-i18n="api.cloudSyncProviderCustom">自定义 WebDAV</option>
                            </select>
                        </div>
                    </label>
                    <label class="field">
                        <span class="label" data-i18n="api.cloudSyncBaseUrl">WebDAV 服务器地址</span>
                        <div class="field-frame"><input id="cloudSyncBaseInput" type="url" placeholder="https://dav.jianguoyun.com/dav/"></div>
                    </label>
                    <label class="field">
                        <span class="label" data-i18n="api.cloudSyncUsername">WebDAV 账号</span>
                        <div class="field-frame"><input id="cloudSyncUserInput" type="text" autocomplete="username"></div>
                    </label>
                    <label class="field">
                        <span class="label" data-i18n="api.cloudSyncPassword">WebDAV 密码</span>
                        <div class="field-frame"><input id="cloudSyncPasswordInput" type="password" autocomplete="current-password" placeholder="应用密码"></div>
                        <span id="cloudSyncPasswordHint" class="hint"></span>
                    </label>
                    <label class="field">
                        <span class="label" data-i18n="api.cloudSyncRemoteRoot">远程根目录</span>
                        <div class="field-frame"><input id="cloudSyncRemoteRootInput" type="text" value="infinite-canvas-sync"></div>
                    </label>
                    <label class="field">
                        <span class="label" data-i18n="api.cloudSyncProfile">同步配置名</span>
                        <div class="field-frame"><input id="cloudSyncProfileInput" type="text" value="default"></div>
                    </label>
                    <label class="cloud-sync-toggle">
                        <input id="cloudSyncAutoInput" type="checkbox">
                        <span class="cloud-sync-switch"></span>
                        <span>
                            <strong data-i18n="api.cloudSyncAuto">自动上传</strong>
                            <small data-i18n="api.cloudSyncAutoHint">保存 API 配置后自动上传到 WebDAV。</small>
                        </span>
                    </label>
                    <div class="cloud-sync-meta">
                        <span><span data-i18n="api.cloudSyncLastSync">上次同步</span>: <strong id="cloudSyncLastSync">-</strong></span>
                        <span><span data-i18n="api.cloudSyncRemoteFile">云端文件</span>: <strong id="cloudSyncRemoteFile">-</strong></span>
                    </div>
                    <div class="cloud-sync-warning">
                        <i data-lucide="triangle-alert" class="w-4 h-4"></i>
                        <span data-i18n="api.cloudSyncPlainWarning">云端文件会明文包含完整 API Key，请只使用可信 WebDAV 和应用专用密码。</span>
                    </div>
                    <div class="cloud-sync-actions">
                        <button id="cloudSyncTestBtn" class="action-btn" type="button" onclick="testCloudSync()"><i data-lucide="link" class="w-3.5 h-3.5"></i><span data-i18n="api.cloudSyncTest">测试连接</span></button>
                        <button id="cloudSyncSaveBtn" class="action-btn" type="button" onclick="saveCloudSyncConfig()"><i data-lucide="save" class="w-3.5 h-3.5"></i><span data-i18n="api.cloudSyncSaveConfig">保存配置</span></button>
                        <button id="cloudSyncUploadBtn" class="action-btn save-btn" type="button" onclick="uploadCloudSync()"><i data-lucide="upload-cloud" class="w-3.5 h-3.5"></i><span data-i18n="api.cloudSyncUpload">上传到云端</span></button>
                        <button id="cloudSyncDownloadBtn" class="action-btn" type="button" onclick="downloadCloudSync()"><i data-lucide="download-cloud" class="w-3.5 h-3.5"></i><span data-i18n="api.cloudSyncDownload">从云端下载</span></button>
                    </div>
                </div>
            </section>

        </div>
    </div>

    <script src="/static/js/cloud-sync.js?v=2026.07.15.1783332587"></script>
</body>
</html>
